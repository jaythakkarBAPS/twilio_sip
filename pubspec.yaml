name: call_center_app
description: Call center Flutter app powered by Twilio Voice

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Twilio Voice SDK for Flutter (actively maintained)
  twilio_voice: 0.3.2+2

  # Firebase - required for FCM push notifications (inbound calls on Android)
  firebase_core: 4.5.0
  firebase_messaging: 16.1.2

  # HTTP client for token requests to your backend
  http: ^1.2.1

  # Permission handling
  permission_handler: ^11.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
